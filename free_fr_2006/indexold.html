 <TITLE>Fleur de Bitume</TITLE>
 
<SCRIPT language="javascript">

function secouer(nb) {
	var sens=-1;
	var X=0; var Y=0; var dx; var dy
	for (no=nb;no>1;no=no-0.1) {
		dx=-X+sens*Math.round(no*Math.random());
		dy=-Y+sens*Math.round(no*Math.random());
		X=X+dx; Y=Y+dy;
		top.moveBy(dx,dy);
		sens=sens*(-1);
	}
	top.moveBy(-X,-Y);
}
</SCRIPT>
